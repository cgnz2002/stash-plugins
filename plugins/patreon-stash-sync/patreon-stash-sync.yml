name: Patreon Metadata Sync
description: Sync Patreon metadata (title, details, date, URL, performers, studio) into matching Stash scenes and images. Reads an OF-Scraper-shaped user_data.db produced from patreon-dl output by convert_patreon_to_db.py.
version: 1.0.0
url: https://github.com/cgnz2002/stash-plugins

settings:
  dataPath:
    displayName: Patreon Data Path
    description: "Directory (as seen inside the Stash container) searched recursively for user_data.db files produced by convert_patreon_to_db.py. Example: /volume1/stash/media/patreon"
    type: STRING
  parentStudioName:
    displayName: Parent Studio Name
    description: "Name of the top-level Patreon studio. Per-creator studios are created beneath it. Default: Patreon (network)"
    type: STRING
  maxTitleLength:
    displayName: Max Title Length
    description: "Maximum length of a generated title before it is truncated at a sentence or word boundary. Default: 65"
    type: NUMBER
  multiplePerformersOk:
    displayName: Allow Multiple Performer Matches
    description: "If several performers match a creator vanity, attach all of them. Default off: the creator is skipped when the match is ambiguous."
    type: BOOLEAN
  autoCreatePerformers:
    displayName: Create Missing Performers
    description: "When on, create a sparse performer for the creator (and any unmatched @mentions in the post text) instead of skipping. Default off."
    type: BOOLEAN
  autoTagFromText:
    displayName: Auto-tag From Post Text
    description: "When on, scan each post's text and attach any existing Stash tags whose name or alias appears in it (matched the same way as Stash's auto-tagger). Only tags are added, never created. Tags set to ignore auto-tag are skipped. Default off."
    type: BOOLEAN
  skipMultiFile:
    displayName: Skip Multi-file Scenes and Images
    description: "When on, the Sync and Full Sync tasks skip any scene or image that has more than one file, to avoid overwriting their performers and metadata. Does not affect the Tag task. Default off."
    type: BOOLEAN
  crewTagId:
    displayName: Crew Tag ID
    description: "The Stash tag ID that marks crew performers (directors/photographers). Find it in the tag's page URL, e.g. .../tags/42 means the ID is 42. Any performer with this tag -- the creator or an @mentioned collaborator -- is credited in each scene's Director field and each image's Photographer field instead of the performers list; the studio still follows the media's source, and if a post's only credits are crew the creator is added as a performer so nothing is left empty. Leave empty to disable crew handling."
    type: STRING

exec:
  - python
  - "{pluginDir}/sync.py"
interface: raw
errLog: error

tasks:
  - name: Sync Patreon Metadata
    description: Sync metadata to unorganized Patreon scenes and images.
    defaultArgs:
      mode: sync
  - name: Full Sync Patreon Metadata
    description: Re-sync ALL Patreon scenes and images, ignoring the organized flag.
    defaultArgs:
      mode: full
  - name: Tag Patreon From Text
    description: Add tags from post text to ALL Patreon scenes and images. Only adds tags, leaves every other field untouched. Safe for manually edited scenes.
    defaultArgs:
      mode: tag
  - name: Update Crew
    description: Re-apply only the crew logic to ALL Patreon scenes and images - move director/photographer-tagged people into the director/photographer field and out of the performers list. Leaves titles, dates, studios, tags and everything else untouched. Use after tagging new performers as crew, to avoid a full re-sync.
    defaultArgs:
      mode: crew
