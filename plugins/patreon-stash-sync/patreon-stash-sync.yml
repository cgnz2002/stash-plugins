name: Patreon Metadata Sync
description: Sync Patreon post metadata (title, description, date, URL, studio, creator performer) onto matching Stash galleries and the images inside them, reading patreon-dl's on-disk post_info files directly, and build a gallery per Patreon collection.
version: 3.2.0
url: https://github.com/cgnz2002/stash-plugins

settings:
  dataPath:
    displayName: Patreon Data Path
    description: "Directory (as seen inside the Stash container) that patreon-dl downloads into, searched recursively for post folders. Example: /data/patreon"
    type: STRING
  parentStudioName:
    displayName: Parent Studio Name
    description: "Name of the top-level Patreon studio. Per-creator studios are created beneath it, and it is created automatically if it doesn't exist. Default: Patreon (network)"
    type: STRING
  autoTagFromText:
    displayName: Auto-tag From Post Text
    description: "When on, scan each post's title/description and attach any existing Stash tags whose name or alias appears in it (matched the same way as Stash's auto-tagger). Only tags are added, never created. Tags set to ignore auto-tag are skipped. Default off."
    type: BOOLEAN
  syncCollections:
    displayName: Sync Collections
    description: "When on, the Sync and Full Sync tasks create a Stash gallery for each Patreon collection and attach the member posts' images to it. Default on."
    type: BOOLEAN
  dryRun:
    displayName: Dry Run
    description: "When on, every task previews its changes in the log (each gallery/image it would update, each studio/performer/collection gallery it would create) without writing anything to Stash. The 'Preview (Dry Run)' task forces this on for a single run regardless of this setting. Default off."
    type: BOOLEAN

exec:
  - python
  - "{pluginDir}/sync.py"
interface: raw
errLog: error

tasks:
  - name: Sync Patreon Metadata
    description: Sync metadata onto unorganized Patreon galleries and images, and build collection galleries.
    defaultArgs:
      mode: sync
  - name: Full Sync Patreon Metadata
    description: Re-sync ALL Patreon galleries and images (ignoring the organized flag) and rebuild collection galleries.
    defaultArgs:
      mode: full
  - name: Tag Patreon From Text
    description: Add tags from post text to ALL Patreon galleries and images. Only adds tags, leaves every other field untouched. Safe for manually edited galleries.
    defaultArgs:
      mode: tag
  - name: Preview (Dry Run)
    description: Preview a full sync in the log without writing anything to Stash - lists every gallery/image it would update and every studio/performer/collection gallery it would create. Safe to run first.
    defaultArgs:
      mode: full
      dryRun: true
